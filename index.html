<html lang="en">
<head>
<meta charset="UTF-8">

<title>Cleaning Schedule — PrattHub</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#10101a;--bg3:#141420;
  --card:#181824;--card2:#1e1e2e;--card-hover:#242438;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.08);--border3:rgba(255,255,255,0.12);
  --text:#e8e8ef;--text2:#c0c0d0;--text-dim:#6a6a82;--text-faint:#4a4a60;
  --purple:#c084fc;--purple-glow:rgba(192,132,252,0.12);--purple-soft:rgba(192,132,252,0.08);
  --green:#4ade80;--danger:#ff5c5c;--orange:#fb923c;--blue:#60a5fa;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --radius:16px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 10%,rgba(192,132,252,0.03) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 90%,rgba(99,180,255,0.02) 0%,transparent 70%);pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--purple)!important;box-shadow:0 0 0 3px var(--purple-soft)}
::placeholder{color:var(--text-faint)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes shimmer{0%{opacity:0.4}50%{opacity:0.7}100%{opacity:0.4}}

.header{background:linear-gradient(180deg,rgba(192,132,252,0.06) 0%,var(--bg) 100%);padding:20px 24px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:800px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:14px}
.logo-mark{width:44px;height:44px;border-radius:14px;background:var(--purple-glow);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid rgba(192,132,252,0.15)}
.back-link{color:var(--text-dim);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:0.5px;transition:color 0.2s}
.back-link:hover{color:var(--purple)}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.header .sub{font-size:12px;color:var(--text-dim);margin-top:1px}
.sync-badge{font-size:11px;color:var(--green);background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:20px;padding:3px 10px;font-weight:600}

.content{max-width:800px;margin:0 auto;padding:20px 24px}

/* Tabs */
.view-tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:9px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);background:transparent;color:var(--text-dim);transition:all 0.2s;white-space:nowrap}
.tab-btn.active{background:var(--purple);color:#0a0a0f}

/* Day nav */
.day-nav{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.day-btn{padding:10px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s;text-align:center;min-width:52px;white-space:nowrap}
.day-btn:hover{border-color:var(--border3);color:var(--text)}
.day-btn.active{background:var(--purple);color:#0a0a0f;border-color:var(--purple)}
.day-btn.today{box-shadow:0 0 0 2px var(--purple)}
.day-btn.rest{opacity:0.4}
.day-btn .day-name{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.day-btn .day-date{display:block;font-size:16px;font-weight:800;margin-top:2px}
.day-btn .day-count{display:block;font-size:9px;margin-top:2px;opacity:0.7}

/* Room sections */
.room-section{margin-bottom:16px;animation:fadeIn 0.3s ease both}
.room-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--card);border-radius:12px 12px 0 0;border:1px solid var(--border);border-bottom:none}
.room-name{font-size:14px;font-weight:800;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
.room-count{font-size:10px;color:var(--text-dim);background:var(--bg2);padding:2px 8px;border-radius:8px;font-weight:600}
.room-items{background:var(--card);border:1px solid var(--border);border-radius:0 0 12px 12px;overflow:hidden}

/* Task rows */
.task-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);transition:all 0.15s;cursor:pointer}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:rgba(255,255,255,0.02)}
.task-row.done{opacity:0.35}
.task-row.done .task-name{text-decoration:line-through;color:var(--text-dim)}
.task-check{width:22px;height:22px;min-width:22px;border-radius:7px;border:2px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--purple);transition:all 0.2s;background:transparent}
.task-check.done{background:var(--purple);border-color:var(--purple);color:#0a0a0f}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600}
.task-meta{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;align-items:center}
.task-freq{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--purple-soft);color:var(--purple)}
.task-assign{font-size:10px;color:var(--text-dim)}
.task-note{font-size:11px;color:var(--text-faint);margin-top:2px;font-style:italic}
.task-streak{font-size:10px;color:var(--orange);font-weight:700}

/* Frequency badges */
.freq-daily{background:rgba(251,146,60,0.12);color:#fb923c}
.freq-eod{background:rgba(96,165,250,0.12);color:#60a5fa}
.freq-weekly{background:var(--purple-soft);color:var(--purple)}
.freq-biweekly{background:rgba(45,212,191,0.12);color:#2dd4bf}
.freq-monthly{background:rgba(251,191,36,0.12);color:#fbbf24}
.freq-quarterly{background:rgba(248,113,113,0.12);color:#f87171}
.freq-seasonal{background:rgba(244,114,182,0.12);color:#f472b6}

/* Summary bar */
.summary-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.summary-card{flex:1;min-width:90px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.summary-num{font-size:24px;font-weight:800;color:var(--purple)}
.summary-label{font-size:10px;color:var(--text-dim);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* Progress bar */
.progress-wrap{margin-bottom:20px}
.progress-bar-bg{height:8px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:99px;background:var(--purple);transition:width 0.5s ease}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-top:6px}

/* Add task form */
.add-form{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:20px}
.add-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.add-input{flex:1;min-width:180px;padding:11px 14px;border-radius:12px;border:1px solid var(--border);font-size:14px;color:var(--text);font-family:var(--font);background:var(--bg2)}
.add-sel{padding:11px 10px;border-radius:12px;border:1px solid var(--border);font-size:13px;color:var(--text);font-family:var(--font);background:var(--bg2);cursor:pointer;-webkit-appearance:auto;appearance:auto}
.btn{border:none;border-radius:12px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;transition:all 0.25s}
.btn-primary{background:var(--purple);color:#0a0a0f}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,132,252,0.3)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:10px}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border3);color:var(--text)}

/* Trash schedule banner */
.trash-banner{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.trash-icon{font-size:24px}
.trash-info{flex:1}
.trash-title{font-size:13px;font-weight:700}
.trash-detail{font-size:12px;color:var(--text-dim);margin-top:2px}
.trash-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px}
.trash-yes{background:rgba(74,222,128,0.12);color:var(--green)}
.trash-no{background:rgba(255,255,255,0.05);color:var(--text-faint)}

/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--purple);color:#0a0a0f;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:700;z-index:2000;box-shadow:0 8px 30px rgba(192,132,252,0.3);animation:toastIn 0.3s ease}

/* Loading */
.skeleton{animation:shimmer 1.5s infinite}
.skel-bar{height:52px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:8px}

/* All tasks view */
.all-tasks-room{margin-bottom:20px}
.all-tasks-room-title{font-size:16px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* Responsive */
@media(max-width:600px){
  .header{padding:14px 16px}
  .header h1{font-size:18px}
  .content{padding:16px}
  .add-row{flex-direction:column}
  .day-nav{gap:4px}
  .day-btn{min-width:44px;padding:8px 10px}
  .summary-card{min-width:70px;padding:10px}
}
</style>
</head>

// ═══ TASK SCHEDULING LOGIC ═══
function isTaskDueOnDate(task, dateStr) {
  const dayName = getDayName(dateStr);
  if (dayName === "sunday") return false; // Rest day

  const freq = task.freq;
  const today = new Date(dateStr + "T12:00:00");

  if (freq === "daily") return true;

  if (freq === "eod") {
    // Every other day — use day-of-year parity
    const start = new Date(today.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((today - start) / 86400000);
    return dayOfYear % 2 === 0;
  }

  if (freq === "weekly") return task.day === dayName;

  if (freq === "biweekly") {
    if (task.day !== dayName) return false;
    // Use week number parity
    const jan1 = new Date(today.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((today - jan1) / 86400000 + jan1.getDay()) / 7);
    return weekNum % 2 === 0;
  }

  if (freq === "monthly") {
    if (task.day !== dayName && task.day !== "all") return false;
    // Only on the specific week of the month
    const mw = task.monthWeek || 1;
    if (task.day === dayName) return getMonthWeek(dateStr) === mw;
    return false;
  }

  if (freq === "quarterly") {
    if (task.day !== dayName) return false;
    const month = today.getMonth();
    return (month % 3 === 0) && getMonthWeek(dateStr) === (task.monthWeek || 1);
  }

  return false;
}

function getTasksForDate(dateStr) {
  return allTasks.filter(t => isTaskDueOnDate(t, dateStr));
}

function isTaskDone(taskId, dateStr) {
  return !!completions[dateStr]?.[taskId];
}

// ═══ FIREBASE ═══
function initFirebase() {
  db.ref("cleaning/tasks").on("value", snap => {
    const val = snap.val();
    if (!val) {
      // Seed initial tasks
      const obj = {};
      SEED_TASKS.forEach(t => { obj[t.id] = t; });
      db.ref("cleaning/tasks").set(obj);
    } else {
      allTasks = Object.values(val);
    }
    synced = true;
    render();
  });

  db.ref("cleaning/completions").on("value", snap => {
    completions = snap.val() || {};
    render();
  });
}

function toggleTask(taskId, dateStr) {
  const path = `cleaning/completions/${dateStr}/${taskId}`;
  if (isTaskDone(taskId, dateStr)) {
    db.ref(path).remove();
  } else {
    db.ref(path).set(true);
  }
}

function addTask(task) {
  const id = "t_" + Date.now();
  db.ref(`cleaning/tasks/${id}`).set({...task, id});
  toast("Task added!");
}

function deleteTask(taskId) {
  db.ref(`cleaning/tasks/${taskId}`).remove();
  toast("Task removed");
}

// ═══ HELPERS ═══
function toast(msg) {
  toastMsg = msg;
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastMsg = null; render(); }, 2500);
}

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function getWeekDates() {
  const d = new Date(selectedDate + "T12:00:00");
  const dayOfWeek = d.getDay();
  const sunday = new Date(d);
  sunday.setDate(d.getDate() - dayOfWeek);
  return Array.from({length:7}, (_, i) => {
    const dd = new Date(sunday);
    dd.setDate(sunday.getDate() + i);
    return dd.toLocaleDateString("en-CA");
  });
}

function getStreak(taskId) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 60; i++) {
    const ds = new Date(d);
    ds.setDate(d.getDate() - i);
    const dateStr = ds.toLocaleDateString("en-CA");
    const task = allTasks.find(t => t.id === taskId);
    if (!task || !isTaskDueOnDate(task, dateStr)) continue;
    if (isTaskDone(taskId, dateStr)) streak++;
    else break;
  }
  return streak;
}

// ═══ RENDER ═══
function render() {
  const app = document.getElementById("app");

  if (!synced) {
    app.innerHTML = `
      <div class="header"><div class="header-inner">
        <div class="header-left"><div class="logo-mark">🧹</div>
        <div><a href="https://mpratt1809.github.io/hub/" class="back-link">← PRATTHUB</a><h1>Cleaning Schedule</h1><p class="sub">Syncing…</p></div></div>
      </div></div>
      <div class="content"><div class="skeleton"><div class="skel-bar"></div><div class="skel-bar"></div><div class="skel-bar"></div></div></div>`;
    return;
  }

  const weekDates = getWeekDates();
  const todayTasks = getTasksForDate(selectedDate);
  const doneTasks = todayTasks.filter(t => isTaskDone(t.id, selectedDate));
  const pct = todayTasks.length ? Math.round((doneTasks.length / todayTasks.length) * 100) : 0;
  const dayName = getDayName(selectedDate);
  const isRest = dayName === "sunday";
  const isMon = dayName === "monday";

  // Trash info for selected date
  const isTrashDay = isMon;
  const isRecycling = isMon && isRecyclingWeek(selectedDate);

  app.innerHTML = `
    ${toastMsg ? `<div class="toast">${esc(toastMsg)}</div>` : ""}
    <div class="header"><div class="header-inner">
      <div class="header-left"><div class="logo-mark">🧹</div>
      <div>
        <a href="https://mpratt1809.github.io/hub/" class="back-link">← PRATTHUB</a>
        <h1>Cleaning Schedule</h1>
        <p class="sub">${new Date(selectedDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</p>
      </div></div>
      <span class="sync-badge">🔴 Live</span>
    </div></div>

    <div class="content">
      <div class="view-tabs">
        <button class="tab-btn${currentView==="today"?" active":""}" onclick="setView('today')">📋 Day View</button>
        <button class="tab-btn${currentView==="week"?" active":""}" onclick="setView('week')">🗓 Week</button>
        <button class="tab-btn${currentView==="all"?" active":""}" onclick="setView('all')">📂 All Tasks</button>
        <button class="tab-btn${currentView==="add"?" active":""}" onclick="setView('add')">➕ Add</button>
      </div>

      ${currentView === "today" || currentView === "week" ? renderDayNav(weekDates) : ""}
      ${currentView === "today" ? renderDayView(todayTasks, doneTasks, pct, isRest, isTrashDay, isRecycling) : ""}
      ${currentView === "week" ? renderWeekView(weekDates) : ""}
      ${currentView === "all" ? renderAllTasks() : ""}
      ${currentView === "add" ? renderAddForm() : ""}
    </div>`;
}

function renderDayNav(weekDates) {
  return `<div class="day-nav">${weekDates.map(ds => {
    const d = new Date(ds+"T12:00:00");
    const isToday = ds === todayStr();
    const isActive = ds === selectedDate;
    const dayN = getDayName(ds);
    const tasks = getTasksForDate(ds);
    const done = tasks.filter(t => isTaskDone(t.id, ds)).length;
    return `<button class="day-btn${isActive?" active":""}${isToday?" today":""}${dayN==="sunday"?" rest":""}" onclick="selectDate('${ds}')">
      <span class="day-name">${DAY_LABELS[d.getDay()]}</span>
      <span class="day-date">${d.getDate()}</span>
      <span class="day-count">${dayN==="sunday"?"Rest":`${done}/${tasks.length}`}</span>
    </button>`;
  }).join("")}</div>`;
}

function renderDayView(tasks, done, pct, isRest, isTrashDay, isRecycling) {
  if (isRest) {
    return `<div class="empty-state"><div class="icon">😌</div><h3>Rest Day</h3><p>Sundays are for rest — no cleaning tasks!</p></div>`;
  }

  // Group by room
  const grouped = {};
  tasks.forEach(t => {
    if (!grouped[t.room]) grouped[t.room] = [];
    grouped[t.room].push(t);
  });

  const trashHtml = isTrashDay ? `
    <div class="trash-banner">
      <div class="trash-icon">🗑️</div>
      <div class="trash-info">
        <div class="trash-title">Monday Trash Day</div>
        <div class="trash-detail">Compost + Trash every week${isRecycling ? " · ♻️ Recycling this week!" : ""}</div>
      </div>
      <span class="trash-badge ${isRecycling?"trash-yes":"trash-no"}">${isRecycling?"♻️ Recycling Week":"No Recycling"}</span>
    </div>` : "";

  const roomsHtml = ROOMS.filter(r => grouped[r.id]?.length).map(room => {
    const roomTasks = grouped[room.id];
    return `<div class="room-section">
      <div class="room-header" style="border-left:3px solid var(--purple)">
        <span class="room-name">${room.emoji} ${room.label} <span class="room-count">${roomTasks.filter(t=>isTaskDone(t.id,selectedDate)).length}/${roomTasks.length}</span></span>
      </div>
      <div class="room-items">${roomTasks.map(t => renderTaskRow(t, selectedDate)).join("")}</div>
    </div>`;
  }).join("");

  return `
    <div class="summary-bar">
      <div class="summary-card"><div class="summary-num">${tasks.length}</div><div class="summary-label">Tasks</div></div>
      <div class="summary-card"><div class="summary-num">${done.length}</div><div class="summary-label">Done</div></div>
      <div class="summary-card"><div class="summary-num">${pct}%</div><div class="summary-label">Complete</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label"><span>${done.length} of ${tasks.length} tasks</span><span>${pct===100?"✨ All done!":""}</span></div>
    </div>
    ${trashHtml}
    ${tasks.length === 0 ? `<div class="empty-state"><div class="icon">✅</div><h3>Light day!</h3><p>No scheduled tasks for this day.</p></div>` : roomsHtml}`;
}

function renderWeekView(weekDates) {
  let html = "";
  weekDates.forEach(ds => {
    const dayN = getDayName(ds);
    if (dayN === "sunday") return;
    const tasks = getTasksForDate(ds);
    const done = tasks.filter(t => isTaskDone(t.id, ds)).length;
    const pct = tasks.length ? Math.round((done/tasks.length)*100) : 0;
    const d = new Date(ds+"T12:00:00");
    const isToday = ds === todayStr();
    html += `<div class="room-section">
      <div class="room-header" style="border-left:3px solid ${isToday?"var(--purple)":"var(--border3)"}">
        <span class="room-name">${DAY_LABELS[d.getDay()]} ${d.getMonth()+1}/${d.getDate()} ${isToday?"(Today)":""} <span class="room-count">${done}/${tasks.length} · ${pct}%</span></span>
      </div>
      <div class="room-items">${tasks.length === 0 ? `<div style="padding:12px 16px;color:var(--text-dim);font-size:13px">No tasks</div>` : tasks.map(t => renderTaskRow(t, ds)).join("")}</div>
    </div>`;
  });
  return html;
}

function renderTaskRow(task, dateStr) {
  const done = isTaskDone(task.id, dateStr);
  const room = ROOM_MAP[task.room] || {};
  const streak = getStreak(task.id);
  const freqClass = `freq-${task.freq}`;
  return `<div class="task-row${done?" done":""}" onclick="toggleTask('${task.id}','${dateStr}')">
    <div class="task-check${done?" done":""}">${done?"✓":""}</div>
    <div class="task-body">
      <div class="task-name">${esc(task.name)}</div>
      <div class="task-meta">
        <span class="task-freq ${freqClass}">${FREQ_LABELS[task.freq]||task.freq}</span>
        <span class="task-assign">${task.assign==="Both"?"👥 Both":task.assign==="Meagan"?"💪 Meagan":"💙 Sky"}</span>
        ${streak > 1 ? `<span class="task-streak">🔥 ${streak}</span>` : ""}
      </div>
      ${task.note ? `<div class="task-note">${esc(task.note)}</div>` : ""}
    </div>
  </div>`;
}

function renderAllTasks() {
  let html = "";
  ROOMS.forEach(room => {
    const roomTasks = allTasks.filter(t => t.room === room.id);
    if (!roomTasks.length) return;
    html += `<div class="all-tasks-room">
      <div class="all-tasks-room-title">${room.emoji} ${room.label}</div>
      ${roomTasks.map(t => `<div class="room-section" style="margin-bottom:4px">
        <div class="task-row" style="background:var(--card);border:1px solid var(--border);border-radius:10px">
          <div class="task-body">
            <div class="task-name">${esc(t.name)}</div>
            <div class="task-meta">
              <span class="task-freq freq-${t.freq}">${FREQ_LABELS[t.freq]}</span>
              <span class="task-assign">${t.assign==="Both"?"👥":""}${t.assign}</span>
              ${t.day && t.day!=="all" ? `<span style="font-size:10px;color:var(--text-dim)">${t.day.charAt(0).toUpperCase()+t.day.slice(1)}</span>` : ""}
            </div>
            ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ""}
          </div>
          <button onclick="event.stopPropagation();if(confirm('Delete this task?'))deleteTask('${t.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;opacity:0.3;padding:8px" title="Delete">🗑</button>
        </div>
      </div>`).join("")}
    </div>`;
  });
  return html || `<div class="empty-state"><div class="icon">📂</div><h3>No tasks</h3></div>`;
}

function renderAddForm() {
  return `<div class="add-form">
    <h3 style="font-size:16px;font-weight:800;margin-bottom:16px">➕ Add New Task</h3>
    <div class="add-row">
      <input class="add-input" id="addName" placeholder="Task name…" />
    </div>
    <div class="add-row">
      <select class="add-sel" id="addRoom" style="flex:1">${ROOMS.map(r=>`<option value="${r.id}">${r.emoji} ${r.label}</option>`).join("")}</select>
      <select class="add-sel" id="addFreq" style="flex:1">
        ${Object.entries(FREQ_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join("")}
      </select>
    </div>
    <div class="add-row">
      <select class="add-sel" id="addDay" style="flex:1">
        <option value="all">Any day (daily/eod)</option>
        <option value="monday">Monday</option><option value="tuesday">Tuesday</option>
        <option value="wednesday">Wednesday</option><option value="thursday">Thursday</option>
        <option value="friday">Friday</option><option value="saturday">Saturday</option>
      </select>
      <select class="add-sel" id="addAssign" style="flex:1">
        ${ASSIGN_OPTIONS.map(a=>`<option value="${a}">${a}</option>`).join("")}
      </select>
    </div>
    <div class="add-row">
      <input class="add-input" id="addNote" placeholder="Notes (optional — cleaning supplies, methods, etc.)" />
    </div>
    <div class="add-row">
      <select class="add-sel" id="addMonthWeek" style="flex:1">
        <option value="1">Week 1 of month</option><option value="2">Week 2</option>
        <option value="3">Week 3</option><option value="4">Week 4</option>
      </select>
      <span style="font-size:11px;color:var(--text-dim);align-self:center">(For monthly/quarterly tasks only)</span>
    </div>
    <button class="btn btn-primary" onclick="submitNewTask()" style="width:100%;margin-top:8px">Add Task</button>
  </div>`;
}

// ═══ EVENT HANDLERS ═══
window.setView = function(v) { currentView = v; render(); };
window.selectDate = function(ds) { selectedDate = ds; if(currentView==="week") currentView="today"; render(); };
window.toggleTask = toggleTask;
window.deleteTask = deleteTask;

window.submitNewTask = function() {
  const name = document.getElementById("addName")?.value?.trim();
  if (!name) return toast("Enter a task name");
  const task = {
    room: document.getElementById("addRoom").value,
    name,
    freq: document.getElementById("addFreq").value,
    day: document.getElementById("addDay").value,
    assign: document.getElementById("addAssign").value,
    note: document.getElementById("addNote")?.value?.trim() || "",
    monthWeek: parseInt(document.getElementById("addMonthWeek").value) || 1,
  };
  addTask(task);
  document.getElementById("addName").value = "";
  document.getElementById("addNote").value = "";
};

// ═══ INIT ═══
initFirebase();
</script>
</body>
</html>
